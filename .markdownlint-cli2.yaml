# markdownlint-cli2 configuration
---
config:
  # MD013 - Line length
  MD013:
    line_length: 120
    code_blocks: false
    tables: false

  # MD033 - Allow inline HTML (needed for MDX)
  MD033: false

  # MD041 - First line should be a heading
  MD041: false

  # MD024 - Allow duplicate headings in different sections
  MD024:
    siblings_only: true

  # MD026 - Allow trailing punctuation in headings
  MD026: false

  # MD036 - Allow emphasis used instead of heading
  MD036: false

  # MD046 - Code block style
  MD046:
    style: fenced

globs:
  - "**/*.md"
  - "!node_modules/**"
  - "!.next/**"
  - "!CHANGELOG.md"
